version: "3.9"

services:

  rabbitmq:

    image: rabbitmq:3.13-management

    container_name: rabbitmq

    hostname: rabbitmq

    restart: unless-stopped

    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: bankuser
      RABBITMQ_DEFAULT_PASS: bankpassword

    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  rabbitmq-data:
