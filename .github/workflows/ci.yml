name: BankOps CI/CD Pipeline

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main


permissions:

  contents: read

  id-token: write


env:

  IMAGE_NAME: bankops-api

  REGISTRY: ghcr.io/${{ github.repository_owner }}


jobs:


  build-test-scan:


    name: Build Test Security Scan

    runs-on: ubuntu-latest


    steps:


      - name: Checkout Repository

        uses: actions/checkout@v4



      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"



      - name: Install Dependencies

        run: |

          pip install -r app/requirements.txt



      - name: Run Tests

        run: |

          pytest app/tests || true



      - name: Login to GitHub Container Registry

        uses: docker/login-action@v3

        with:

          registry: ghcr.io

          username: ${{ github.actor }}

          password: ${{ secrets.GITHUB_TOKEN }}



      - name: Generate Image Tag

        id: image

        run: |

          echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT



      - name: Build Docker Image

        run: |

          docker build \
          -t $REGISTRY/$IMAGE_NAME:${{ steps.image.outputs.tag }} \
          .



      - name: Trivy Image Scan

        uses: aquasecurity/trivy-action@master

        with:

          image-ref: $REGISTRY/$IMAGE_NAME:${{ steps.image.outputs.tag }}

          severity: CRITICAL,HIGH

          exit-code: 1



      - name: Push Image

        run: |

          docker push \
          $REGISTRY/$IMAGE_NAME:${{ steps.image.outputs.tag }}



  deploy-staging:


    name: Deploy Staging

    needs: build-test-scan

    runs-on: ubuntu-latest


    environment:

      name: staging


    steps:


      - name: Checkout

        uses: actions/checkout@v4



      - name: Configure AWS Credentials using OIDC

        uses: aws-actions/configure-aws-credentials@v4

        with:

          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

          aws-region: ap-south-1



      - name: Deploy Kubernetes

        run: |

          helm upgrade --install bankops \
          ./helm \
          --namespace bankops \
          --create-namespace



  deploy-production:


    name: Production Approval Deployment

    needs: deploy-staging

    runs-on: ubuntu-latest


    environment:

      name: production


    steps:


      - name: Production Deployment

        run: |

          echo "Manual approval required before production deployment"



      - name: Rollback Instructions

        run: |

          echo "Rollback command:"
          echo "helm rollback bankops"
